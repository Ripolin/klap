namespace: kube-system
resources:
  - https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
patches:
  - target:
      kind: Deployment
      name: metrics-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --kubelet-insecure-tls

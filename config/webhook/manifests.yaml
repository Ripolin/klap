- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-klap-ripolin-github-com-v1alpha1-server
  failurePolicy: Fail
  name: vserver-v1alpha1.kb.io
  rules:
  - apiGroups:
    - klap.ripolin.github.com
    apiVersions:

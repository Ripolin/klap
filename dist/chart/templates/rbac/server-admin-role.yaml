{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: klap
    name: klap-server-admin-role
rules:
    - apiGroups:
        - klap.ripolin.github.com
      resources:
        - servers
      verbs:
        - '*'
    - apiGroups:
        - klap.ripolin.github.com
      resources:
        - servers/status
      verbs:
        - get
{{- end }}

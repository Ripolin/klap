apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "klap.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - klap.ripolin.github.com
  resources:
  - entries
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - klap.ripolin.github.com
  resources:
  - entries/finalizers
  verbs:
  - update
- apiGroups:
  - klap.ripolin.github.com
  resources:
  - entries/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - klap.ripolin.github.com
  resources:
  - servers
  verbs:
  - get
  - list
  - watch

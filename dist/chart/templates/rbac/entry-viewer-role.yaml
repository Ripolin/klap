{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: klap
    name: klap-entry-viewer-role
rules:
    - apiGroups:
        - klap.ripolin.github.com
      resources:
        - entries
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - klap.ripolin.github.com
      resources:
        - entries/status
      verbs:
        - get
{{- end }}

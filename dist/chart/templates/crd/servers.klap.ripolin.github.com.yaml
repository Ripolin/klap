{{- if .Values.crd.enable }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.20.1
  name: servers.klap.ripolin.github.com
spec:
  group: klap.ripolin.github.com
  names:
    kind: Server
    listKind: ServerList
    plural: servers
    singular: server
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.url
      name: URL
      type: string
    - jsonPath: .spec.implementation
      name: IMPLEMENTATION
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Server is the Schema for the servers API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Server
            properties:
              baseDN:
                description: BaseDN is the base distinguished name for the server
                type: string
              bindDN:
                description: BindDN is the distinguished name to bind as when connecting
                  to the server
                type: string
              implementation:
                default: openldap
                description: Implementation is the server implementation type (e.g.,
                  "openldap", "activedirectory")
                type: string
              passwordSecretRef:
                description: PasswordSecretRef is a reference to a secret containing
                  the password to bind with
                properties:
                  key:
                    description: Key within a secret
                    type: string
                  name:
                    description: Name of a secret
                    type: string
                  namespace:
                    description: Namespace of a secret
                    type: string
                required:
                - key
                - name
                - namespace
                type: object
              startTLS:
                default: false
                description: StartTLS indicates whether to use StartTLS when connecting
                  to the server
                type: boolean
              tlsSecretRef:
                description: TlsSecretRef is a reference to a secret containing TLS
                  configuration for the server
                properties:
                  key:
                    description: Key within a secret
                    type: string
                  name:
                    description: Name of a secret
                    type: string
                  namespace:
                    description: Namespace of a secret
                    type: string
                required:
                - key
                - name
                - namespace
                type: object
              url:
                description: Url is the URL of the server
                type: string
            required:
            - baseDN
            - bindDN
            - implementation
            - passwordSecretRef
            - startTLS
            - url
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources: {}
{{- end }}

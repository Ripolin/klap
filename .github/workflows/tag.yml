name: Create Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (auto = let git-cliff decide)"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

jobs:
  create-tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Install git-cliff
        uses: taiki-e/install-action@db5fb34fa772531a3ece57ca434f579eb334e0fb # v2
        with:
          tool: git-cliff

      - name: Compute next version
        id: version
        run: |
          args="--config cliff.toml --bumped-version"
          if [[ "${{ inputs.bump }}" != "auto" ]]; then
            args="$args --bump ${{ inputs.bump }}"
          fi
          version=$(git-cliff $args)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          tag=${{ steps.version.outputs.version }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag" -m "chore: release $tag"
          git push origin "$tag"

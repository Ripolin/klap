name: Create Tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (auto = let git-cliff decide)"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - major
          - minor
          - patch

jobs:
  create-tag:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Install git-cliff
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20 # v2.83.3
        with:
          tool: git-cliff

      - name: Compute next version
        id: version
        run: |
          args="--config cliff.toml --bumped-version"
          if [[ "${{ inputs.bump }}" != "auto" ]]; then
            args="$args --bump ${{ inputs.bump }}"
          fi
          version=$(git-cliff $args)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          tag=${{ steps.version.outputs.version }}
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag" -m "chore: release $tag"
          git push origin "$tag"

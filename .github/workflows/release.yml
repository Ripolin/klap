name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ripolin/klap

jobs:
  build-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  publish-chart:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      CHART_OCI_PATH: ripolin/helm
      CHART_PATH: dist/chart

    needs:
      - build-image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update chart version
        run: |
          yq -i '.version = "${{ github.ref_name }}"' ${{ env.CHART_PATH }}/Chart.yaml
          yq -i '.appVersion = "${{ github.ref_name }}"' ${{ env.CHART_PATH }}/Chart.yaml
          yq -i '.manager.image.repository = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"' ${{ env.CHART_PATH }}/values.yaml
          yq -i '.manager.image.tag = "${{ github.ref_name }}"' ${{ env.CHART_PATH }}/values.yaml

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package and push Helm chart
        run: |
          helm package ${{ env.CHART_PATH }} --version ${{ github.ref_name }}
          helm push klap-${{ github.ref_name }}.tgz oci://${{ env.REGISTRY }}/${{ env.CHART_OCI_PATH }}

  changelog:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      content: ${{ steps.cliff.outputs.content }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header

  github-release:
    runs-on: ubuntu-latest
    needs:
      - build-image
      - publish-chart
      - changelog

    permissions:
      contents: write

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.content }}
          tag_name: ${{ github.ref_name }}

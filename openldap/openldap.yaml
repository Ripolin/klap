apiVersion: v1
kind: Namespace
metadata:
  name: openldap
---
apiVersion: v1
kind: Service
metadata:
  name: ldap
spec:
  ports:
    - name: ldap
      port: 389
      protocol: TCP
      targetPort: ldap
    - name: ldaps
      port: 636
      protocol: TCP
      targetPort: ldaps
  selector:
    app: openldap
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openldap
spec:
  selector:
    matchLabels:
      app: openldap
  serviceName: openldap
  replicas: 1
  template:
    metadata:
      labels:
        app: openldap
    spec:
      containers:
        - name: openldap
          image: bitnamilegacy/openldap:2.6.10-debian-12-r4
          ports:
            - containerPort: 1389
              name: ldap
            - containerPort: 1636
              name: ldaps
          volumeMounts:
            - name: data
              mountPath: /bitnami/openldap
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
